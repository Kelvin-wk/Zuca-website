<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZUCA - Zetech University Catholic Action</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              serif: ['Playfair Display', 'serif'],
            },
            colors: {
              divine: {
                gold: '#F59E0B',
                blue: '#2563EB',
                indigo: '#4F46E5',
                crimson: '#E11D48',
              }
            },
            animation: {
              'blob': 'blob 10s infinite',
              'float': 'float 6s ease-in-out infinite',
              'spin-slow': 'spin 12s linear infinite',
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'shimmer': 'shimmer 2s linear infinite',
              'divine-ray': 'ray 15s ease-in-out infinite',
              'glow': 'glow 3s ease-in-out infinite',
              'slide-up': 'slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1)',
              'scale-in': 'scaleIn 0.4s cubic-bezier(0.16, 1, 0.3, 1)',
              'sacred-pulse': 'sacredPulse 2s infinite',
            },
            keyframes: {
              blob: {
                '0%': { transform: 'translate(0px, 0px) scale(1)' },
                '33%': { transform: 'translate(40px, -60px) scale(1.15)' },
                '66%': { transform: 'translate(-30px, 30px) scale(0.9)' },
                '100%': { transform: 'translate(0px, 0px) scale(1)' },
              },
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-15px)' },
              },
              shimmer: {
                '0%': { backgroundPosition: '-200% 0' },
                '100%': { backgroundPosition: '200% 0' },
              },
              ray: {
                '0%, 100%': { opacity: 0.1, transform: 'rotate(-25deg) translateX(-10%)' },
                '50%': { opacity: 0.3, transform: 'rotate(-20deg) translateX(0%)' },
              },
              glow: {
                '0%, 100%': { filter: 'brightness(1) drop-shadow(0 0 5px rgba(59, 130, 246, 0.2))' },
                '50%': { filter: 'brightness(1.2) drop-shadow(0 0 20px rgba(59, 130, 246, 0.5))' },
              },
              slideUp: {
                '0%': { transform: 'translateY(20px)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' },
              },
              scaleIn: {
                '0%': { transform: 'scale(0.95)', opacity: '0' },
                '100%': { transform: 'scale(1)', opacity: '1' },
              },
              sacredPulse: {
                '0%, 100%': { boxShadow: '0 0 0 0 rgba(245, 158, 11, 0.4)' },
                '70%': { boxShadow: '0 0 0 15px rgba(245, 158, 11, 0)' },
              }
            }
          },
        },
      }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        overflow-x: hidden;
      }
      .font-serif {
        font-family: 'Playfair Display', serif;
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 10px;
      }
      .dark .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #334155;
      }
      
      .bg-cinematic {
        position: fixed;
        inset: 0;
        z-index: -1;
        overflow: hidden;
        background: radial-gradient(circle at 50% 0%, #ffffff, #f1f5f9);
      }
      .dark .bg-cinematic {
        background: radial-gradient(circle at 50% 0%, #1e293b, #020617);
      }

      .divine-light {
        position: absolute;
        top: -10%;
        left: -10%;
        width: 120%;
        height: 120%;
        background: repeating-linear-gradient(
          -25deg,
          transparent,
          transparent 100px,
          rgba(255, 255, 255, 0.08) 150px,
          transparent 200px
        );
        filter: blur(50px);
        animation: ray 20s ease-in-out infinite;
        pointer-events: none;
      }

      .mesh-gradient {
        position: absolute;
        width: 150%;
        height: 150%;
        top: -25%;
        left: -25%;
        background-image: 
          radial-gradient(at 10% 10%, rgba(37, 99, 235, 0.15) 0, transparent 50%),
          radial-gradient(at 90% 10%, rgba(124, 58, 237, 0.15) 0, transparent 50%),
          radial-gradient(at 50% 90%, rgba(245, 158, 11, 0.1) 0, transparent 50%);
        filter: blur(120px);
        animation: rotate 80s linear infinite;
      }

      @keyframes rotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      .aura-card {
        transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        position: relative;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .aura-card::after {
        content: "";
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle at center, rgba(59, 130, 246, 0.12) 0%, transparent 70%);
        opacity: 0;
        transition: opacity 0.6s;
        pointer-events: none;
      }
      .aura-card:hover::after {
        opacity: 1;
      }
      .aura-card:hover {
        transform: translateY(-12px) scale(1.02);
        box-shadow: 0 40px 80px -15px rgba(59, 130, 246, 0.3);
        border-color: rgba(59, 130, 246, 0.4);
      }
      .dark .aura-card:hover {
        box-shadow: 0 40px 80px -15px rgba(0, 0, 0, 0.8);
        border-color: rgba(59, 130, 246, 0.2);
      }

      .glass-morphism {
        background: rgba(255, 255, 255, 0.75);
        backdrop-filter: blur(25px);
        -webkit-backdrop-filter: blur(25px);
        border: 1px solid rgba(255, 255, 255, 0.4);
      }
      .dark .glass-morphism {
        background: rgba(15, 23, 42, 0.75);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .btn-premium {
        position: relative;
        overflow: hidden;
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        z-index: 1;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      }
      .btn-premium::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.3),
          transparent
        );
        transition: 0.6s;
        z-index: -1;
      }
      .btn-premium:hover::before {
        left: 100%;
      }
      .btn-premium:hover {
        transform: translateY(-3px) scale(1.03);
        box-shadow: 0 20px 30px -8px rgba(37, 99, 235, 0.5);
      }
      .btn-premium:active {
        transform: translateY(0) scale(0.96);
      }

      .text-sacred-glow {
        text-shadow: 0 0 10px rgba(245, 158, 11, 0.5);
      }
      .dark .text-sacred-glow {
        text-shadow: 0 0 20px rgba(245, 158, 11, 0.8);
      }
      
      .steward-badge {
        background: linear-gradient(135deg, #F59E0B, #D97706);
        box-shadow: 0 0 15px rgba(245, 158, 11, 0.4);
      }

      .faith-card-border {
        position: relative;
      }
      .faith-card-border::before {
        content: '';
        position: absolute;
        inset: -1px;
        background: linear-gradient(45deg, transparent, rgba(59, 130, 246, 0.3), transparent);
        border-radius: inherit;
        z-index: -1;
        transition: opacity 0.3s;
        opacity: 0;
      }
      .faith-card-border:hover::before {
        opacity: 1;
      }

      /* Adorable Sparkle Animation */
      @keyframes divine-sparkle {
        0%, 100% { opacity: 0; transform: scale(0.5) rotate(0deg); }
        50% { opacity: 1; transform: scale(1.2) rotate(180deg); }
      }
      .sparkle {
        position: absolute;
        width: 4px;
        height: 4px;
        background: white;
        border-radius: 50%;
        box-shadow: 0 0 10px white;
        pointer-events: none;
        animation: divine-sparkle 2s infinite;
      }

      /* Glowing Path for Sidebar */
      .glowing-path {
        position: relative;
      }
      .glowing-path::after {
        content: '';
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 3px;
        background: linear-gradient(to bottom, transparent, #2563EB, transparent);
        box-shadow: 0 0 15px #2563EB;
        opacity: 0.6;
      }

      /* Premium Glass Morphism */
      .glass-premium {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      }
      .dark .glass-premium {
        background: rgba(15, 23, 42, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.03);
      }

      /* Animated Border Gradient */
      .gradient-border {
        position: relative;
        border-radius: inherit;
      }
      .gradient-border::before {
        content: "";
        position: absolute;
        inset: -2px;
        background: linear-gradient(45deg, #2563EB, #4F46E5, #F59E0B, #2563EB);
        background-size: 400% 400%;
        z-index: -1;
        animation: border-gradient 12s linear infinite;
        border-radius: inherit;
        opacity: 0;
        transition: opacity 0.3s;
      }
      .gradient-border:hover::before {
        opacity: 0.5;
      }
      @keyframes border-gradient {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }

      /* Floating Animation Variants */
      @keyframes float-slow {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        50% { transform: translateY(-20px) rotate(2deg); }
      }
      .animate-float-slow {
        animation: float-slow 8s ease-in-out infinite;
      }

      /* Text Glow Effect */
      .text-glow-blue {
        text-shadow: 0 0 10px rgba(37, 99, 235, 0.5);
      }
      .text-glow-gold {
        text-shadow: 0 0 10px rgba(245, 158, 11, 0.5);
      }

      /* Custom Scrollbar for Premium Feel */
      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: rgba(37, 99, 235, 0.2);
        border-radius: 20px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: rgba(37, 99, 235, 0.5);
      }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 transition-colors duration-500">
    <div class="bg-cinematic">
      <div class="mesh-gradient"></div>
      <div class="divine-light"></div>
      <div class="absolute top-0 -left-10 w-[600px] h-[600px] bg-blue-500/15 dark:bg-blue-900/15 rounded-full mix-blend-multiply filter blur-[120px] animate-blob"></div>
      <div class="absolute bottom-0 -right-10 w-[600px] h-[600px] bg-amber-400/10 dark:bg-amber-900/10 rounded-full mix-blend-multiply filter blur-[120px] animate-blob animation-delay-2000"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
